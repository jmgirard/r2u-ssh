# Diagnostic: measure r2u mirror connection reliability from amd64 vs arm64
# GitHub-hosted runners. Throwaway experiment for r2u discussion #159 — NOT part
# of the product build. Manual dispatch; each run appends one CSV row per attempt
# to a per-arch artifact so results aggregate across several dispatches.
name: mirror-probe

on:
  # Push to the diagnostic branch runs it (workflow_dispatch alone is not
  # dispatchable from a non-default branch). Re-run via "Re-run all jobs" to
  # accumulate independent samples without touching the default branch.
  push:
    branches: [diag/mirror-arch-probe]
  workflow_dispatch:
    inputs:
      iterations:
        description: "Connect probes per architecture"
        required: false
        default: "30"
      connect_timeout:
        description: "Per-attempt connect timeout (seconds)"
        required: false
        default: "30"
      sleep_between:
        description: "Seconds to sleep between probes (independent connections)"
        required: false
        default: "2"
      burst_size:
        description: "Parallel new connections in the burst step (apt-style fan-out)"
        required: false
        default: "120"
      num_downloads:
        description: "How many real r-cran .debs to fetch in the bulk step"
        required: false
        default: "150"
      bulk_parallel:
        description: "Concurrent .deb downloads in the bulk step (real-build fan-out)"
        required: false
        default: "12"

# Endpoint mirrors what `apt-get update` hits via the rocker/r2u base source.
env:
  PROBE_URL: "https://r2u.stat.illinois.edu/ubuntu/dists/noble/InRelease"

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: probe-${{ matrix.arch }}
    steps:
      - name: Context
        run: |
          # Capture the runner's egress IP ONCE and export it, so every probe/
          # event row is tagged with the source range it was sampled from — the
          # key variable if the fault is tied to specific Azure IP ranges.
          ip="$(curl -s --max-time 15 https://api.ipify.org || echo unknown)"
          echo "EGRESS_IP=${ip}" >> "$GITHUB_ENV"
          echo "arch=${{ matrix.arch }} runner=${{ matrix.runner }}"
          echo "uname: $(uname -m)"
          echo "utc:   $(date -u +%FT%TZ)"
          echo "egress IP: ${ip}"

      - name: Curl connect probes
        id: curl
        run: |
          set -u
          # Fall back to defaults on push events, where inputs.* are unset.
          N="${{ inputs.iterations }}";      N="${N:-30}"
          CT="${{ inputs.connect_timeout }}"; CT="${CT:-30}"
          SLEEP="${{ inputs.sleep_between }}"; SLEEP="${SLEEP:-2}"
          RUN_TS="$(date -u +%FT%TZ)"
          ARCH="${{ matrix.arch }}"
          OUT="probe-${ARCH}.csv"
          # CSV header. run_id+run_attempt uniquely key each sample batch;
          # egress_ip tags the source range for per-/16 stratification.
          echo "run_id,run_attempt,attempt,arch,egress_ip,utc,exit_code,http_code,time_connect,time_total,timed_out" > "$OUT"

          fails=0
          declare -a connects=()
          for i in $(seq 1 "$N"); do
            ts="$(date -u +%FT%TZ)"
            # Capture curl's own exit code (set -u, no set -e, so a failure here
            # does not abort the loop). -w emits metrics even on a failed request.
            metrics="$(curl -sS -o /dev/null \
                --connect-timeout "$CT" --max-time "$((CT + 15))" \
                -w '%{http_code} %{time_connect} %{time_total}' \
                "$PROBE_URL" 2>/dev/null)"
            ec=$?
            read -r http tc tt <<< "$metrics"
            http="${http:-000}"; tc="${tc:-0}"; tt="${tt:-0}"
            timed_out=0
            # curl exit 28 = timeout; treat any non-200 or nonzero exit as a failure.
            if [ "$ec" -eq 28 ]; then timed_out=1; fi
            if [ "$ec" -ne 0 ] || [ "$http" != "200" ]; then
              fails=$((fails + 1))
              echo "attempt $i: FAIL exit=$ec http=$http connect=${tc}s total=${tt}s"
            else
              connects+=("$tc")
              echo "attempt $i: ok   http=$http connect=${tc}s total=${tt}s"
            fi
            echo "${{ github.run_id }},${{ github.run_attempt }},$i,$ARCH,${EGRESS_IP:-unknown},$ts,$ec,$http,$tc,$tt,$timed_out" >> "$OUT"
            [ "$i" -lt "$N" ] && sleep "$SLEEP"
          done

          rate=$(awk "BEGIN{printf \"%.1f\", ($fails/$N)*100}")
          # p50/p95 of successful connect times.
          p50="n/a"; p95="n/a"
          if [ "${#connects[@]}" -gt 0 ]; then
            sorted=$(printf '%s\n' "${connects[@]}" | sort -n)
            cnt=${#connects[@]}
            i50=$(awk "BEGIN{printf \"%d\", ($cnt*0.5)+0.5}"); [ "$i50" -lt 1 ] && i50=1
            i95=$(awk "BEGIN{printf \"%d\", ($cnt*0.95)+0.5}"); [ "$i95" -lt 1 ] && i95=1
            p50=$(echo "$sorted" | sed -n "${i50}p")
            p95=$(echo "$sorted" | sed -n "${i95}p")
          fi

          {
            echo "### mirror-probe — ${ARCH} (run ${{ github.run_id }})"
            echo ""
            echo "| metric | value |"
            echo "|---|---|"
            echo "| runner | \`${{ matrix.runner }}\` |"
            echo "| egress IP | \`${EGRESS_IP:-unknown}\` |"
            echo "| attempts | $N |"
            echo "| failures | $fails |"
            echo "| failure rate | ${rate}% |"
            echo "| connect p50 (ok) | ${p50}s |"
            echo "| connect p95 (ok) | ${p95}s |"
            echo "| started (UTC) | $RUN_TS |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "SUMMARY ${ARCH}: ${fails}/${N} failed (${rate}%), connect p50=${p50}s p95=${p95}s"

      - name: Real apt-get update against r2u source (isolated)
        run: |
          set -u
          # Faithful reproduction of the Docker build step: query ONLY the r2u
          # source, timed. Non-fatal — a hang here is exactly the signal we want.
          tmp="$(mktemp -d)"
          # Pin the source to this runner's arch so a 404 (missing index) can't be
          # mistaken for the connection hang we are hunting.
          echo "deb [trusted=yes arch=${{ matrix.arch }}] https://r2u.stat.illinois.edu/ubuntu noble main" \
            > "$tmp/r2u.list"
          echo "-- timing apt-get update against r2u only --"
          start=$(date +%s)
          if timeout 120 sudo apt-get update \
              -o Dir::Etc::sourcelist="$tmp/r2u.list" \
              -o Dir::Etc::sourceparts="/dev/null" \
              -o APT::Get::List-Cleanup="0"; then
            echo "apt r2u update: OK in $(( $(date +%s) - start ))s"
          else
            echo "apt r2u update: FAILED/TIMED OUT after $(( $(date +%s) - start ))s"
          fi

      - name: Burst of parallel new connections (apt-style fan-out)
        run: |
          set -u
          # A real install.packages() batch opens many connections in a tight
          # window; if the mirror/firewall drops SYNs under concurrency, a burst
          # exposes it where a paced probe would not. Each worker makes ONE fresh
          # connection (no keep-alive) and reports 1 on failure, 0 on HTTP 200.
          BURST="${{ inputs.burst_size }}"; BURST="${BURST:-50}"
          CT="${{ inputs.connect_timeout }}"; CT="${CT:-30}"
          ARCH="${{ matrix.arch }}"
          EV="events-${ARCH}.csv"
          echo "run_id,run_attempt,arch,egress_ip,utc,kind,n,failures,duration_s,note" > "$EV"
          export PROBE_URL CT
          ts="$(date -u +%FT%TZ)"; start="$(date +%s)"
          # $CT/$PROBE_URL expand inside the inner (exported-env) bash -c; awk '$1'
          # is an awk field, not a shell variable — both are intentional.
          # shellcheck disable=SC2016
          fails="$(seq 1 "$BURST" | xargs -P "$BURST" -n1 bash -c '
              code=$(curl -sS -o /dev/null --connect-timeout "$CT" \
                  --max-time "$((CT + 15))" -w "%{http_code}" "$PROBE_URL" 2>/dev/null)
              [ "$code" = "200" ] && echo 0 || echo 1
            ' _ | awk '{s+=$1} END{print s+0}')"
          dur=$(( $(date +%s) - start ))
          echo "burst: ${fails}/${BURST} parallel connections failed in ${dur}s"
          echo "${{ github.run_id }},${{ github.run_attempt }},$ARCH,${EGRESS_IP:-unknown},$ts,burst,$BURST,$fails,$dur,parallel${BURST}" >> "$EV"
          {
            echo "| burst (${BURST} parallel) | ${fails} failed in ${dur}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bulk r2u package fetch (real .debs, straight from the mirror)
        run: |
          set -u
          # apt resolves r-cran-* against the Ubuntu archive (which also ships
          # r-cran-*), so `apt-get download` fetched from azure.archive.ubuntu.com,
          # not r2u. To isolate r2u we read r2u's OWN Packages index and curl real
          # .deb URLs straight from the mirror. Each .deb is one fetch = exactly the
          # build's unit of exposure, over full-size transfers (catches mid-stream
          # stalls a connect-only probe misses).
          NDL="${{ inputs.num_downloads }}"; NDL="${NDL:-150}"
          CT="${{ inputs.connect_timeout }}"; CT="${CT:-30}"
          BP="${{ inputs.bulk_parallel }}"; BP="${BP:-12}"
          ARCH="${{ matrix.arch }}"
          EV="events-${ARCH}.csv"
          IP="${EGRESS_IP:-unknown}"
          BASE="https://r2u.stat.illinois.edu/ubuntu"
          pkgs="$(mktemp)"
          # Fetch r2u's real index for this arch (accurate coverage, unlike apt-cache).
          if ! curl -sS --max-time 90 "$BASE/dists/noble/main/binary-${ARCH}/Packages.gz" \
                | gunzip > "$pkgs" 2>/dev/null; then
            echo "could not fetch r2u Packages index for ${ARCH}"
            echo "${{ github.run_id }},${{ github.run_attempt }},$ARCH,$IP,$(date -u +%FT%TZ),bulk,0,1,0,index-fetch-failed" >> "$EV"
            exit 0
          fi
          avail="$(grep -c '^Package: ' "$pkgs")"
          echo "r2u exposes ${avail} packages for ${ARCH}"
          echo "${{ github.run_id }},${{ github.run_attempt }},$ARCH,$IP,$(date -u +%FT%TZ),coverage,$avail,0,0,r2u-pkg-count" >> "$EV"

          mapfile -t files < <(awk '/^Filename: /{print $2}' "$pkgs" | shuf | head -n "$NDL")
          got=${#files[@]}
          ts="$(date -u +%FT%TZ)"; start="$(date +%s)"
          # Download the .debs with real-build concurrency; each worker emits
          # "exit_code http_code size" so we can tally failures and timeouts.
          res="$(mktemp)"
          export BASE CT
          # $BASE/$CT/$1 expand inside the inner (exported-env) bash -c — intentional.
          # shellcheck disable=SC2016
          printf '%s\n' "${files[@]}" | xargs -P "$BP" -n1 bash -c '
              m=$(curl -sS -o /dev/null --connect-timeout "$CT" --max-time "$((CT + 90))" \
                  -w "%{http_code} %{size_download}" "$BASE/$1" 2>/dev/null); ec=$?
              read -r code sz <<< "$m"
              echo "$ec ${code:-000} ${sz:-0}"
            ' _ > "$res"
          dur=$(( $(date +%s) - start ))
          dlfail=$(awk '$1!=0 || $2!=200 {c++} END{print c+0}' "$res")
          conn_to=$(awk '$1==28 {c++} END{print c+0}' "$res")
          bytes=$(awk '{b+=$3} END{print b+0}' "$res")
          mb=$(( bytes / 1000000 ))
          if [ "$dlfail" -eq 0 ]; then note="ok-${got}debs-${mb}MB-p${BP}"
          else note="fail${dlfail}_timeout${conn_to}_${mb}MB-p${BP}"; fi
          echo "bulk: ${got} real .debs from r2u (parallel ${BP}) → ${dlfail} failed (${conn_to} timeouts), ${mb}MB in ${dur}s"
          echo "${{ github.run_id }},${{ github.run_attempt }},$ARCH,$IP,$ts,bulk,$got,$dlfail,$dur,$note" >> "$EV"
          {
            echo "| r2u coverage (${ARCH}) | ${avail} packages |"
            echo "| bulk fetch | ${got} .debs, ${dlfail} failed (${conn_to} timeouts), ${mb}MB in ${dur}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload per-arch CSVs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-${{ matrix.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            probe-${{ matrix.arch }}.csv
            events-${{ matrix.arch }}.csv
          if-no-files-found: warn
